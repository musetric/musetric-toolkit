# Allowed Conventional Commit types and scopes.
#
# Format: `type(scope): subject`  (scope is required)
#   feat(chords): add jazz chord recognition
#   fix(separate): handle silent audio input
#   ci(github): cancel superseded pr-title runs
#
# Read by .github/workflows/pr-title.yml and enforced on every PR title.
# Inline comments below document what each key means and when to use it.
#
# Adding a new scope: add it here and merge to main first — the linter reads
#   this list from the base branch, so a PR cannot use a scope that is not yet on main.
# Removing a feature + its scope: do it in one PR (the scope still exists on the base branch).

# Type = what kind of change it is.
types:
  - feat # new user-facing functionality
  - fix # bug fix in existing behavior
  - perf # speed/memory optimization, behavior unchanged
  - refactor # internal code rewritten, behavior unchanged
  - revert # roll back a previously merged change
  - docs # documentation, comments, readme only
  - test # tests added/changed, no production code touched
  - build # build system & packaged artifacts (hatch, onnx export)
  - ci # CI/CD pipelines (this workflow, etc.)
  - chore # housekeeping that touches no production code, build, or CI

# Scope = which area the change belongs to.
scopes:
  # Audio processing modules
  - chords # chord detection & recognition (chords_audio)
  - key # musical key detection (key_audio)
  - rhythm # tempo, beat, rhythm analysis (rhythm_audio)
  - separate # audio source separation (separate_audio)
  - transcribe # speech/audio transcription (transcribe_audio)
  # Shared
  - common # shared utilities (common/)
  # CLI
  - cli # command-line interface & entry points
  # Quality & tooling
  - lint # ruff, black, isort rules
  - deps # dependency add / update / remove
  - agent # agent guidance & config (AGENTS.md, AI tooling)
  - github # repo & GitHub Actions settings (workflows, templates)
