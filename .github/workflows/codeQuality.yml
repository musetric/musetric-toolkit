name: Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13.11"
      - run: pip install uv
      # Lint only needs ruff/black/isort; skip the project and its heavy CUDA deps.
      - run: uv sync --only-group check
      - run: uv run --group check python scripts/check.py
