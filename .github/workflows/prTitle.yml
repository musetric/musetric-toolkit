name: PR Title

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: prTitle-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-pr-title:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      # Allowed types/scopes live in .github/prTitle.config.yml (with inline docs).
      # Flatten the YAML lists into the newline-delimited strings the action expects.
      - id: config
        name: Build allowed types and scopes
        run: |
          {
            printf 'types<<EOF\n'
            yq '.types[]' .github/prTitle.config.yml
            printf 'EOF\n'
            printf 'scopes<<EOF\n'
            yq '.scopes[]' .github/prTitle.config.yml
            printf 'EOF\n'
          } >> "$GITHUB_OUTPUT"
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          requireScope: true
          types: ${{ steps.config.outputs.types }}
          scopes: ${{ steps.config.outputs.scopes }}
          subjectPattern: '^.{20,70}$'
          subjectPatternError: 'Subject must be 20-70 characters'
